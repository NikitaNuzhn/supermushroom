<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стрибучий Грибок</title>
<style>
body {
margin: 0;
padding: 0;
background: #222;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
font-family: 'Courier New', Courier, monospace;
overflow: hidden;
}

#gameContainer {
position: relative;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

canvas {
display: block;
background: #6185f8; /* Класичне блакитне небо Маріо */
image-rendering: pixelated; /* Піксельний стиль */
}

#scoreBoard {
position: absolute;
top: 10px;
left: 10px;
color: white;
font-size: 20px;
font-weight: bold;
text-shadow: 2px 2px 0px #000;
}

#gameOverScreen {
display: none;
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.7);
color: white;
flex-direction: column;
justify-content: center;
align-items: center;
font-size: 30px;
text-shadow: 3px 3px 0px #000;
}

#restartBtn {
margin-top: 20px;
padding: 10px 20px;
background: #e52521; /* Червоний колір Маріо */
color: white;
border: 4px solid white;
font-size: 18px;
font-family: 'Courier New', Courier, monospace;
cursor: pointer;
font-weight: bold;
}

#restartBtn:hover {
background: #b31c19;
}
</style>
</head>
<body>

<div id="gameContainer">
<div id="scoreBoard">РАХУНОК: <span id="score">0</span></div>
<canvas id="gameCanvas" width="800" height="400"></canvas>
<div id="gameOverScreen">
<div>ГРУ ЗАКІНЧЕНО</div>
<button id="restartBtn" onclick="resetGame()">ГРАТИ ЗНОВУ</button>
</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");
const gameOverScreen = document.getElementById("gameOverScreen");

// Налаштування гри
let score = 0;
let gameActive = true;
let gameSpeed = 4;

// Стан клавіш керування
const keys = {
ArrowLeft: false,
ArrowRight: false,
ArrowUp: false,
Space: false
};

// Гравець (Грибок Гумба)
const mushroom = {
x: 100,
y: 300,
width: 40,
height: 40,
velocityX: 0,
velocityY: 0,
speed: 4,
friction: 0.85,
gravity: 0.6,
jumpForce: -12,
isGrounded: false
};

// Перешкоди
let obstacles = [];
const obstacleTypes = [
{ type: 'pipe', width: 45, height: 65, color: '#00a800' },
{ type: 'double_pipe', width: 55, height: 90, color: '#00a800' },
{ type: 'brick', width: 35, height: 35, color: '#b84418' }
];

// Декорації
let scenery = [
{ x: 150, y: 80, type: 'cloud', size: 60 },
{ x: 550, y: 50, type: 'cloud', size: 80 },
{ x: 300, y: 310, type: 'bush', size: 50 }
];

// Слухачі клавіатури
window.addEventListener("keydown", (e) => {
if (e.code === "Space") keys.Space = true;
if (e.key in keys) keys[e.key] = true;
});

window.addEventListener("keyup", (e) => {
if (e.code === "Space") keys.Space = false;
if (e.key in keys) keys[e.key] = false;
});

// Створення перешкод
function spawnObstacle() {
if (!gameActive) return;

const proto = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];

obstacles.push({
x: canvas.width + 50,
y: 340 - proto.height,
width: proto.width,
height: proto.height,
color: proto.color,
type: proto.type
});

let nextSpawn = Math.random() * 1500 + 1000;
setTimeout(spawnObstacle, nextSpawn / (gameSpeed * 0.25));
}

// Малювання грибка
function drawMushroom() {
ctx.fillStyle = "#d8a038"; // Ніжка
ctx.fillRect(mushroom.x + 10, mushroom.y + 20, 20, 20);

ctx.fillStyle = "#a81000"; // Капелюшок
ctx.fillRect(mushroom.x, mushroom.y, 40, 22);
ctx.fillRect(mushroom.x + 4, mushroom.y + 22, 32, 4);

ctx.fillStyle = "#f8f8f8"; // Очі
ctx.fillRect(mushroom.x + 6, mushroom.y + 6, 8, 8);
ctx.fillRect(mushroom.x + 26, mushroom.y + 6, 8, 8);
ctx.fillStyle = "#000000"; // Зниці
ctx.fillRect(mushroom.x + 10, mushroom.y + 24, 4, 8);
ctx.fillRect(mushroom.x + 26, mushroom.y + 24, 4, 8);
}

// Малювання фону
function drawScenery() {
scenery.forEach(item => {
ctx.fillStyle = item.type === 'cloud' ? '#f8f8f8' : '#00a800';

if (item.type === 'cloud') {
ctx.fillRect(item.x, item.y, item.size, 20);
ctx.fillRect(item.x + 15, item.y - 15, item.size - 20, 20);
} else {
ctx.fillRect(item.x, item.y, item.size, 30);
ctx.fillRect(item.x + 10, item.y - 10, item.size - 20, 20);
}

if (gameActive) {
item.x -= gameSpeed * 0.2;
if (item.x + item.size < 0) {
item.x = canvas.width + Math.random() * 100;
}
}
});
}

// Малювання землі
function drawGround() {
ctx.fillStyle = "#d88018";
ctx.fillRect(0, 340, canvas.width, 60);

ctx.fillStyle = "#00a800";
ctx.fillRect(0, 340, canvas.width, 8);

ctx.fillStyle = "#000";
for(let i = 0; i < canvas.width; i += 40) {
ctx.fillRect(i, 355, 4, 20);
ctx.fillRect(i + 20, 375, 4, 20);
}
}

// Головний цикл оновлення гри
function update() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

drawScenery();
drawGround();

if (gameActive) {
// --- КЕРУВАННЯ В СТИЛІ МАРІО ---

// Рух вліво / вправо
if (keys.ArrowLeft) {
mushroom.velocityX = -mushroom.speed;
} else if (keys.ArrowRight) {
mushroom.velocityX = mushroom.speed;
} else {
mushroom.velocityX *= mushroom.friction; // Плавна зупинка
}

// Стрибок (Вгору або Пробіл)
if ((keys.ArrowUp || keys.Space) && mushroom.isGrounded) {
mushroom.velocityY = mushroom.jumpForce;
mushroom.isGrounded = false;
}

// Регулювання висоти стрибка (якщо відпустити кнопку раніше — грибок падає швидше)
if (!(keys.ArrowUp || keys.Space) && mushroom.velocityY < -3) {
mushroom.velocityY = -3;
}

// Застосування фізики руху
mushroom.x += mushroom.velocityX;
mushroom.velocityY += mushroom.gravity;
mushroom.y += mushroom.velocityY;

// Обмеження екрану для гравця
if (mushroom.x < 0) mushroom.x = 0;
if (mushroom.x + mushroom.width > canvas.width) mushroom.x = canvas.width - mushroom.width;

// Зіткнення з землею
if (mushroom.y >= 340 - mushroom.height) {
mushroom.y = 340 - mushroom.height;
mushroom.velocityY = 0;
mushroom.isGrounded = true;
}

// Складність гри
gameSpeed += 0.001;
}

drawMushroom();

// Обробка перешкод
for (let i = obstacles.length - 1; i >= 0; i--) {
let obs = obstacles[i];
if (gameActive) obs.x -= gameSpeed;

// Малювання перешкоди
ctx.fillStyle = obs.color;
ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

ctx.strokeStyle = '#000000';
ctx.lineWidth = 3;
ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);

if (obs.type.includes('pipe')) {
ctx.fillStyle = '#00f800';
ctx.fillRect(obs.x + 4, obs.y, 8, obs.height);
ctx.fillStyle = obs.color;
ctx.fillRect(obs.x - 4, obs.y, obs.width + 8, 15);
ctx.strokeRect(obs.x - 4, obs.y, obs.width + 8, 15);
}

// Перевірка зіткнення з перешкодою
if (
mushroom.x < obs.x + obs.width &&
mushroom.x + mushroom.width > obs.x &&
mushroom.y < obs.y + obs.height &&
mushroom.y + mushroom.height > obs.y
) {
gameOver();
}

// Нарахування балів
if (obs.x + obs.width < 0) {
obstacles.splice(i, 1);
score++;
scoreElement.innerText = score;
}
}

requestAnimationFrame(update);
}

function gameOver() {
gameActive = false;
gameOverScreen.style.display = "flex";
}

function resetGame() {
obstacles = [];
score = 0;
gameSpeed = 4;
scoreElement.innerText = score;
mushroom.x = 100;
mushroom.y = 300;
mushroom.velocityX = 0;
mushroom.velocityY = 0;
gameActive = true;
gameOverScreen.style.display = "none";
}

setTimeout(spawnObstacle, 1500);
update();

</script>
</body>
</html>
